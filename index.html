<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>데이트 신청서 🌿</title>
<style>
*{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:#f7faf5;color:#2d4f34}
.page{display:none;min-height:100vh;padding:24px;justify-content:center;align-items:center}
.active{display:flex}
.wrap{width:100%;max-width:520px;background:#fff;border:1px solid #dfead9;border-radius:24px;padding:28px}
.progress{display:flex;gap:8px;margin-bottom:20px}
.progress span{height:6px;flex:1;background:#dfe5db;border-radius:99px}
.progress .on{background:#6cab58}
h1{text-align:center}
.btn{width:100%;padding:14px;border:none;border-radius:14px;margin-top:10px;background:#6cab58;color:#fff;font-size:16px}
.btn.alt{background:#eef7ea;color:#2d4f34;border:1px solid #cfe2c6}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{padding:14px;border:1px solid #d9e7d3;border-radius:14px;cursor:pointer;text-align:center}
.sel{background:#eef7ea;border-color:#6cab58}
textarea,input{width:100%;padding:12px;border:1px solid #d9e7d3;border-radius:12px}
.summary{line-height:2}
</style>
</head>
<body>

<div class="page active" id="p1"><div class="wrap">
<div class="progress"><span class="on"></span><span></span><span></span><span></span><span></span><span></span></div>
<h1>나랑 데이트 갈래? 🌿</h1>
<p style="text-align:center">거절 버튼은 예산 부족으로 삭제되었습니다.</p>
<button class="btn" onclick="go(2)">갈래!</button>
<button class="btn alt" onclick="go(2)">당연히!</button>
</div></div>

<div class="page" id="p2"><div class="wrap">
<div class="progress"><span class="on"></span><span class="on"></span><span></span><span></span><span></span><span></span></div>
<h1>언제 만날래?</h1>
<input id="date" type="date"><br><br>
<input id="time" type="time">
<button class="btn" onclick="go(3)">다음</button>
</div></div>

<div class="page" id="p3"><div class="wrap">
<div class="progress"><span class="on"></span><span class="on"></span><span class="on"></span><span></span><span></span><span></span></div>
<h1>뭐 먹고 싶어?</h1>
<div class="grid" id="foods"></div>
<button class="btn" onclick="go(4)">다음</button>
</div></div>

<div class="page" id="p4"><div class="wrap">
<div class="progress"><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span><span></span><span></span></div>
<h1>그 외 하고 싶은 건?</h1>
<div class="grid" id="acts"></div><br>
<textarea id="req" placeholder="특별 요청이 있다면?"></textarea>
<button class="btn" onclick="makeSummary()">신청서 보기</button>
</div></div>

<div class="page" id="p5"><div class="wrap">
<div class="progress"><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span><span></span></div>
<h1>최종 데이트 신청서</h1>
<div class="summary" id="summary"></div>
<button class="btn" onclick="go(6)">승인할게</button>
<button class="btn alt" onclick="go(6)">완전 승인</button>
</div></div>

<div class="page" id="p6"><div class="wrap">
<div class="progress"><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span><span class="on"></span></div>
<h1>신청 완료!</h1>
<p style="text-align:center">너와 함께할 시간이 벌써 기대돼!<br><br><b>그때 보자! 💚</b></p>
</div></div>

<script>
let food="";
const foods=["🥩 삼겹살","🍣 초밥","🍝 파스타","🍕 피자","🍗 치킨","🍜 라멘","☕ 카페","🍰 디저트"];
const acts=["🎬 영화","🌸 산책","🛍️ 쇼핑","🎤 노래방","🎲 보드게임","🏊 물놀이","🥰 같이 있기"];

foods.forEach(f=>{
 let d=document.createElement('div'); d.className='card'; d.textContent=f;
 d.onclick=()=>{document.querySelectorAll('#foods .card').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); food=f;}
 foodsEl.appendChild(d);
});
acts.forEach(a=>{
 let d=document.createElement('div'); d.className='card'; d.textContent=a;
 d.onclick=()=>d.classList.toggle('sel');
 actsEl.appendChild(d);
});

function go(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById('p'+n).classList.add('active');}
function makeSummary(){
 let selected=[...document.querySelectorAll('#acts .sel')].map(x=>x.textContent).join(', ');
 summary.innerHTML=`❤️ 신청인 : 나<br>❤️ 신청대상 : 너<br><br>📅 ${date.value}<br>🕒 ${time.value}<br>🍽️ ${food}<br>🎈 ${selected||'-'}<br>💌 ${req.value||'-'}`;
 go(5);
}
</script>
</body></html>
